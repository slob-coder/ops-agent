# ═══════════════════════════════════════════════════════════════
# OpsAgent Docker Compose
# ═══════════════════════════════════════════════════════════════
#
# 用法:
#   1. 复制 .env.example 为 .env，填入你的配置
#   2. docker compose up -d
#   3. docker compose logs -f          # 查看日志
#   4. docker compose exec ops-agent bash  # 进入容器
#
# 启用 Notebook 扩展（如 smart-notebook）:
#   docker compose build --build-arg NOTEBOOK_EXT=git+https://github.com/slob-coder/smart-notebook.git
#   docker compose up -d
#
# ═══════════════════════════════════════════════════════════════

services:
  ops-agent:
    build:
      context: ..
      args:
        # Notebook 扩展包，留空则使用 Basic Notebook
        # 示例: git+https://github.com/slob-coder/smart-notebook.git
        NOTEBOOK_EXT: ${NOTEBOOK_EXT:-}
        # 私有仓库 GitHub PAT（可选）
        GIT_TOKEN: ${GIT_TOKEN:-}
    image: ops-agent:latest
    container_name: ops-agent
    tty: true
    stdin_open: true
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./notebook:/data/notebook
      - ~/.ssh:/root/.ssh:ro
      - /var/run/docker.sock:/var/run/docker.sock  # 访问宿主机 Docker
      - /opt/vol/source-projs:/opt/vol/source-projs  # 源码仓库（patch-fix 流程需要）
    ports:
      - "9876:9876"    # Agent HTTP 健康检查 + metrics
      - "9877:9877"    # 飞书事件回调（启用交互模式时需要）
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9876/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
