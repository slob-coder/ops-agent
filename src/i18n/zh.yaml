    可用指令：
       ─── 控制 ───
       status        查看我当前的状态
       pause         暂停自主巡检
       resume        恢复自主巡检
       stop          中止当前调查回到巡检
       readonly on/off  切换只读模式
       freeze        紧急冻结(禁止所有 L2+ 操作)
       unfreeze      解除紧急冻结
