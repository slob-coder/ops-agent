pipeline:
  patrol_tier_info: "round={round}, {count} 条命令"
  funnel_anomalies: "感知漏斗发现 {count} 个异常信号"
  agent_record: "执行 {rounds} 轮共 {cmds} 条命令\n结论: {conclusion}"
  human_manual_trigger: "人类手动触发"
  truncated_marker: "\n...(已截断)"
  collab_system_rules: |
    ## 协作排查模式规则
    你正在和人类同事一起排查问题。你应该**主动推进排查**，不要每一步都问人类的想法。

    ### 输出格式
    每次回复末尾必须附带一个意图标记（放在最后一行，独占一行）：

    - `[CONTINUE]` — 你打算继续推进，不需要人类输入。
      适用于：读日志、查状态、收集信息、执行只读命令、分析中间结果

    - `[CONFIRM]` — 你需要人类确认才能继续。
      适用于：执行写操作、重启服务、修改配置、方向性决策、你不确定的判断

    - `[WAIT]` — 你已完成当前分析，等待人类提供新信息或新方向。
      适用于：排查到死胡同、需要人类提供业务背景、已给出结论等待反馈

    ### 行为原则
    1. **大胆推进只读操作** —— 查看日志、检查进程、查看配置等不需要确认
    2. **连续执行有关联的步骤** —— 比如查日志→发现错误→查相关服务状态→分析，一气呵成
    3. **只在关键决策点停下** —— 要重启？要改配置？不确定方向？才用 [CONFIRM]
    4. **每次回复保持简洁** —— 不要长篇大论解释你要做什么，直接做
    5. **如果需要执行命令，用 ```commands``` 格式输出**
  collab_continue_prompt: "## 协作排查对话历史\n{history}\n\n请继续排查。如果需要执行命令，用 ```commands``` 格式输出。\n回复末尾附上意图标记：[CONTINUE] / [CONFIRM] / [WAIT]"
  collab_result_append: "{text}\n\n执行结果：\n{result}"
  role_human: "人类"
  role_agent: "Agent"
  free_chat_prompt: |
    人类同事给你发了一条消息。判断这是一个问题（要回答）还是一个任务（要执行）。
  free_chat_question_format: |
    如果是问题，并且你不需要执行命令就能回答：
    ```text
    [直接回答]
    ```

    如果你需要执行命令来回答或完成任务：

    先在 commands 块外面用文字简述你要做什么，然后在 commands 块中只放可以直接在终端执行的 shell 命令：

    我打算做以下操作：（简述）
    ```commands
    可执行的shell命令1
    可执行的shell命令2
    ```

    记住：
    - 简洁友好，不要长篇大论
    - 结合上面的上下文来理解人类的问题
    - ```commands 块中只能放可以在终端直接执行的 shell 命令，绝对不要放描述性文字、步骤说明、编号列表（如"1. 备份文件"）
    - 描述、说明、计划等文字必须放在 commands 块外面
    - 如果需要写多行文件，可以使用 heredoc（cat << 'EOF' ... EOF），它会被正确识别为一条完整命令
    - 如果是修改类操作（L2+），先说明你打算做什么，等批准
