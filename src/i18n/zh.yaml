       new / clear chat / 清除对话   清除自由对话上下文
       collab (协作)  进入协作排查模式(人+Agent 一起定位问题)
       self-fix <描述> 触发一次自修复会话(修改 ops-agent 自己)
       quit          让我下班
       ─── 多目标 ───
       targets (lt)          列出所有管理的目标
       switch <目标名>        切换当前激活的目标
       limits                查看限制配额状态
       ─── 查看 ───
       list playbook (lp)    列出所有 Playbook
       list incidents (li)   列出 Incident
       list trace (lt)       列出 Trace 文件
       show <文件名>          查看某个 Notebook 文件
       ─── 自由对话 ───
       直接打字提问或派发任务,我会自己想办法。

