# ═══════════════════════════════════════════════════════════════
# OpsAgent 爆炸半径限制
# ═══════════════════════════════════════════════════════════════
#
# 这些是硬性数值约束,LLM 不能突破。任何超限都强制升级给人类。
# 这是失控时的最后护栏。
#
# 修改后无需重启,Agent 会在下一次主循环重新加载。
# ═══════════════════════════════════════════════════════════════

# ── 总开关 ──
enabled: false

# ── 动作频率限制 ──
# Agent 每小时/每天最多执行多少 L2+ 动作(重启、改配置、改代码)
max_actions_per_hour: 20
max_actions_per_day: 100

# ── 单服务保护 ──
# 同一个服务每小时/每天最多被重启多少次
# 频繁重启往往不能解决问题,这个上限触发后强制升级人类
max_restarts_per_service_per_hour: 3
max_restarts_per_service_per_day: 5

# ── 并发限制 ──
# Agent 最多同时处理多少个 Incident
max_concurrent_incidents: 2

# ── 失败冷却 ──
# 修复失败后,Agent 进入冷却期,期间不再尝试自动修复
# 单位:秒。默认 600 秒 = 10 分钟
cooldown_after_failure_seconds: 600

# ── LLM 成本限制 ──
# 每小时/每天的 token 预算,超出后 Agent 降级到只观察模式
llm_tokens_per_hour: 200000
llm_tokens_per_day: 1000000

# ── 协作模式 ──
# 协作排查时 Agent 连续自主执行的最大轮次,超过后暂停等人确认
max_collab_auto_rounds: 30

# ── 诊断上下文限制 ──
# 传入 LLM 诊断 prompt 的 observations 最大字符数
# 过小会导致 COLLECT_MORE 补充数据被截断,造成死循环
max_observations_chars: 8000

# ═══════════════════════════════════════════════════════════════
# 流程控制上限
# ═══════════════════════════════════════════════════════════════
#
# 这些是 Incident 状态机的安全阀,防止 Agent 陷入无限循环。
# 不同于动作频率限制(限制速率),这些控制的是单次 Incident 的处理深度。

# ── Incident 状态机 ──

# incident_loop 总轮次上限(含 diagnose + fix 所有阶段)
# 超过后强制退出当前 Incident
max_total_rounds: 40

# 诊断阶段最大轮次(COLLECT_MORE 循环的上限)
# 超过后放弃继续收集信息,直接尝试修复
max_diagnose_rounds: 25

# 修复最大尝试次数(PLAN→EXECUTE→VERIFY 循环的上限)
# 超过后放弃自动修复,通知人类
max_fix_attempts: 3

# ── 异常静默窗口 ──

# 同一异常指纹的静默时间(秒),默认 1800 = 30 分钟
# 在此窗口内同一异常不会重复触发 Incident
# 设为 0 则不静默(每次都触发),不建议
silence_window_seconds: 1800

# ── 观测命令数量限制 ──

# observe 阶段每轮最多执行的命令数
max_observe_commands: 15

# verify_steps 最多执行的步骤数
max_verify_steps: 15

# _quick_observe 返回的最大命令数
max_quick_observe_commands: 20

# gap collection 每轮最大命令数
max_gap_commands: 20

# LLM 生成的 gap 补充命令最大条数
max_generated_gap_commands: 20

# 自由对话/协作模式单轮最多执行的命令数
max_chat_commands: 20

# 协作模式保留的最近对话轮数
max_collab_history_rounds: 25

# 历史 Incident 摘要查看的最大条数
max_recent_incidents: 15

# 补丁生成最大尝试次数(patch_loop)
max_patch_attempts: 3

# 源码定位最多处理的栈帧数
max_source_locations: 15

# 未解析栈帧展示上限
max_unresolved_frames: 5
